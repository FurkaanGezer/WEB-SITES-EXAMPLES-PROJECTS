<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img
          src="https://images.pexels.com/photos/1498332/pexels-photo-1498332.jpeg"
          alt="Logo"
        />
      </div>
      <form>
        <div class="title">Login</div>

        <div class="input-box">
          <input type="email" required placeholder="Enter your Email" />
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="password" required placeholder="Enter your Password" />
          <div class="underline"></div>
        </div>
        <div class="input-box button">
          <input type="submit" value="Log In" />
        </div>
      </form>
      <div class="text">Or Connect With Social Media</div>

      <div class="github">
        <a href="#"><i class="fab fa-github"></i>Log in with Github</a>
      </div>

      <div class="twitter">
        <a href="#"><i class="fab fa-twitter"></i>Log in with Twitter</a>
      </div>

      <div class="facebook">
        <a href="#"><i class="fab fa-facebook"></i>Log in with Facebook</a>
      </div>
    </div>
  </body>
</html>
